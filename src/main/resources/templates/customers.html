<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers - RetailPulse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="wrapper">
    <div th:replace="layout :: sidebar('customers')"></div>
    <div id="content">
        <div th:replace="layout :: navbar"></div>
        <div class="p-4 p-md-5">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h4 class="fw-bold mb-1">Customer Management</h4>
                    <p class="text-muted small mb-0">Manage your retail store's customer database.</p>
                </div>
                <button class="btn btn-primary px-4 rounded-pill" data-bs-toggle="modal" data-bs-target="#addCustomerModal">
                    + Add Customer
                </button>
            </div>

            <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${successMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <!-- Stats -->
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="stat-card text-center">
                        <h5 class="fw-bold mb-0" th:text="${customers.size()}">0</h5>
                        <p class="text-muted small mb-0">Total Customers</p>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-0">
                    <div class="px-4 py-3 border-bottom d-flex justify-content-between align-items-center">
                        <h6 class="fw-bold mb-0">Directory</h6>
                        <div style="width: 250px;">
                            <input type="text" id="customerSearch" class="form-control form-control-sm rounded-pill px-3" placeholder="Search customers..." onkeyup="filterCustomersTable()">
                        </div>
                    </div>
                    <table class="table table-hover mb-0 align-middle" id="customersTable">
                        <thead style="background:#f8f9fc;">
                            <tr>
                                <th class="px-4 py-3 fw-semibold text-muted" style="font-size:0.8rem;">#ID</th>
                                <th class="py-3 fw-semibold text-muted" style="font-size:0.8rem;">NAME</th>
                                <th class="py-3 fw-semibold text-muted" style="font-size:0.8rem;">EMAIL</th>
                                <th class="py-3 fw-semibold text-muted" style="font-size:0.8rem;">PHONE</th>
                                <th class="px-4 py-3 fw-semibold text-muted text-end" style="font-size:0.8rem;">ACTION</th>
                            </tr>
                        </thead>
                        <tbody id="customersTableBody">
                            <tr th:each="c : ${customers}" class="customer-row">
                                <td class="px-4 py-3 text-muted" th:text="'#' + ${c.id}"></td>
                                <td class="py-3">
                                    <div class="d-flex align-items-center gap-2">
                                        <div class="avatar-circle" th:text="${c.name != null && !c.name.isEmpty() ? c.name.substring(0,1).toUpperCase() : '?'}"></div>
                                        <span class="fw-semibold customer-name" th:text="${c.name ?: 'N/A'}"></span>
                                    </div>
                                </td>
                                <td class="py-3 text-muted customer-email" th:text="${c.email ?: '—'}"></td>
                                <td class="py-3 customer-phone" th:text="${c.phone ?: '—'}"></td>
                                <td class="px-4 py-3 text-end">
                                    <button type="button" class="btn btn-sm btn-outline-primary rounded-pill px-3 me-1"
                                            onclick="openEditCustomerModal(this)"
                                            th:data-id="${c.id}" th:data-name="${c.name ?: ''}" th:data-email="${c.email ?: ''}" th:data-phone="${c.phone ?: ''}">
                                        Edit
                                    </button>
                                    <form th:action="@{/customers/delete/{id}(id=${c.id})}" method="POST" style="display:inline;">
                                        <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3"
                                                onclick="return confirm('Delete this customer?')">Delete</button>
                                    </form>
                                </td>
                            </tr>
                            <tr id="noCustomersRow" style="display:none;">
                                <td colspan="5" class="text-center py-4 text-muted small">No customers match your search.</td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(customers)}">
                                <td colspan="5" class="text-center py-5 text-muted">
                                    <p class="mb-1">No customers yet.</p>
                                    <small>Click "Add Customer" to get started!</small>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add Customer Modal -->
<div class="modal fade" id="addCustomerModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg rounded-4">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold">Add New Customer</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form th:action="@{/customers/add}" method="POST" onsubmit="return validateCustomerForm(this)">
          <div class="modal-body pt-3">
              <div class="mb-3">
                  <label class="form-label text-muted small fw-semibold">Full Name <span class="text-danger">*</span></label>
                  <input type="text" name="name" class="form-control rounded-3" placeholder="e.g. Riya Sharma" required>
              </div>
              <div class="mb-3">
                  <label class="form-label text-muted small fw-semibold">Email Address <span class="text-danger">*</span></label>
                  <input type="email" name="email" class="form-control rounded-3" placeholder="riya@email.com" required>
              </div>
              <div class="mb-3">
                  <label class="form-label text-muted small fw-semibold">Phone Number <span class="text-danger">*</span></label>
                  <input type="text" name="phone" class="form-control rounded-3" placeholder="9876543210" required>
              </div>
          </div>
          <div class="modal-footer border-0 pt-0">
            <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary rounded-pill px-4">Save Customer</button>
          </div>
      </form>
    </div>
  </div>
</div>

<!-- Edit Customer Modal -->
<div class="modal fade" id="editCustomerModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg rounded-4">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold">Edit Customer</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="editCustomerForm" method="POST" onsubmit="return validateCustomerForm(this)">
          <div class="modal-body pt-3">
              <div class="mb-3">
                  <label class="form-label text-muted small fw-semibold">Full Name <span class="text-danger">*</span></label>
                  <input type="text" id="editCustName" name="name" class="form-control rounded-3" required>
              </div>
              <div class="mb-3">
                  <label class="form-label text-muted small fw-semibold">Email Address <span class="text-danger">*</span></label>
                  <input type="email" id="editCustEmail" name="email" class="form-control rounded-3" required>
              </div>
              <div class="mb-3">
                  <label class="form-label text-muted small fw-semibold">Phone Number <span class="text-danger">*</span></label>
                  <input type="text" id="editCustPhone" name="phone" class="form-control rounded-3" required>
              </div>
          </div>
          <div class="modal-footer border-0 pt-0">
            <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary rounded-pill px-4">Update Customer</button>
          </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
var contextPath = /*[[@{/}]]*/ '/';

function openEditCustomerModal(btn) {
    var id = btn.getAttribute('data-id');
    document.getElementById('editCustName').value = btn.getAttribute('data-name');
    document.getElementById('editCustEmail').value = btn.getAttribute('data-email');
    document.getElementById('editCustPhone').value = btn.getAttribute('data-phone');
    document.getElementById('editCustomerForm').action = contextPath + 'customers/edit/' + id;
    new bootstrap.Modal(document.getElementById('editCustomerModal')).show();
}

function validateCustomerForm(form) {
    var name = form.querySelector('[name="name"]').value.trim();
    var email = form.querySelector('[name="email"]').value.trim();
    var phone = form.querySelector('[name="phone"]').value.trim();
    return true; // the required attributes on inputs will handle basic validation natively.
}

function filterCustomersTable() {
    var query = document.getElementById('customerSearch').value.toLowerCase().trim();
    var rows = document.querySelectorAll('.customer-row');
    var visibleCount = 0;
    
    rows.forEach(function(row) {
        var name = row.querySelector('.customer-name').textContent.toLowerCase();
        var email = row.querySelector('.customer-email').textContent.toLowerCase();
        var phone = row.querySelector('.customer-phone').textContent.toLowerCase();
        
        if (name.includes(query) || email.includes(query) || phone.includes(query)) {
            row.style.display = '';
            visibleCount++;
        } else {
            row.style.display = 'none';
        }
    });
    
    var noResults = document.getElementById('noCustomersRow');
    if (noResults) {
        noResults.style.display = visibleCount === 0 && rows.length > 0 ? '' : 'none';
    }
}
</script>
<script th:replace="layout :: darkModeScript"></script>
</body>
</html>
