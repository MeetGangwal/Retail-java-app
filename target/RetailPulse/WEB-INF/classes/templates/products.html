<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - RetailPulse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="wrapper">
    <div th:replace="layout :: sidebar('products')"></div>
    <div id="content">
        <div th:replace="layout :: navbar"></div>
        <div class="p-4 p-md-5">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h4 class="fw-bold mb-1">Products Inventory</h4>
                    <p class="text-muted small mb-0">Manage your store's product catalog and stock levels.</p>
                </div>
                <button class="btn btn-primary px-4 rounded-pill" data-bs-toggle="modal" data-bs-target="#addProductModal">
                    + Add Product
                </button>
            </div>

            <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${successMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <!-- Stats -->
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="stat-card text-center">
                        <h5 class="fw-bold mb-0" th:text="${products.size()}">0</h5>
                        <p class="text-muted small mb-0">Total Products</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card text-center">
                        <h5 class="fw-bold mb-0 text-warning" th:text="${lowStockCount}">0</h5>
                        <p class="text-muted small mb-0">Low Stock Items</p>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-0">
                    <div class="px-4 py-3 border-bottom d-flex justify-content-between align-items-center flex-wrap gap-3">
                        <h6 class="fw-bold mb-0">Product List</h6>
                        <div class="d-flex gap-2 align-items-center">
                            <input type="text" id="productSearch" class="form-control form-control-sm rounded-pill px-3" placeholder="Search by name..." onkeyup="filterProductsTable()" style="width: 200px;">
                            <select id="filterCategory" class="form-select form-select-sm rounded-pill px-3" onchange="filterProductsTable()">
                                <option value="">All Categories</option>
                                <option value="kg">Kilogram (kg)</option>
                                <option value="gram">Gram (gram)</option>
                                <option value="liters">Liters (liters)</option>
                                <option value="milli liters">Milli Liters (ml)</option>
                            </select>
                            <select id="filterStatus" class="form-select form-select-sm rounded-pill px-3" onchange="filterProductsTable()">
                                <option value="">All Statuses</option>
                                <option value="In Stock">In Stock</option>
                                <option value="Low Stock">Low Stock</option>
                                <option value="Out of Stock">Out of Stock</option>
                            </select>
                        </div>
                    </div>
                    <table class="table table-hover mb-0 align-middle" id="productsTable">
                        <thead style="background:#f8f9fc;">
                            <tr>
                                <th class="px-4 py-3 fw-semibold text-muted" style="font-size:0.8rem;">#ID</th>
                                <th class="py-3 fw-semibold text-muted" style="font-size:0.8rem;">CATEGORY</th>
                                <th class="py-3 fw-semibold text-muted" style="font-size:0.8rem;">PRODUCT NAME</th>
                                <th class="py-3 fw-semibold text-muted" style="font-size:0.8rem;">PRICE</th>
                                <th class="py-3 fw-semibold text-muted" style="font-size:0.8rem;">STOCK</th>
                                <th class="py-3 fw-semibold text-muted" style="font-size:0.8rem;">STATUS</th>
                                <th class="px-4 py-3 fw-semibold text-muted text-end" style="font-size:0.8rem;">ACTION</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody">
                            <tr th:each="p : ${products}" class="product-row"
                                th:data-category="${p.unitCategory != null ? p.unitCategory : ''}"
                                th:data-status="${p.stock == 0 ? 'Out of Stock' : (p.stock < 10 ? 'Low Stock' : 'In Stock')}">
                                <td class="px-4 py-3 text-muted" th:text="'#' + ${p.id}"></td>
                                <td class="py-3">
                                    <span class="badge rounded-pill bg-info bg-opacity-10 text-info px-3 py-2"
                                          th:text="${p.unitCategory != null ? p.unitCategory : '—'}"></span>
                                </td>
                                <td class="py-3 fw-semibold product-name" th:text="${p.name ?: 'Unnamed'}"></td>
                                <td class="py-3 fw-bold text-primary" th:text="'₹' + ${p.price ?: 0}"></td>
                                <td class="py-3" th:text="${p.stock ?: 0} + ' units'"></td>
                                <td class="py-3">
                                    <span class="badge rounded-pill px-3 py-2"
                                          th:classappend="${p.stock == null || p.stock == 0} ? 'bg-danger' : (${p.stock < 10} ? 'text-warning bg-warning bg-opacity-10' : 'text-success bg-success bg-opacity-10')"
                                          th:text="${p.stock == null || p.stock == 0} ? 'Out of Stock' : (${p.stock < 10} ? 'Low Stock' : 'In Stock')">
                                    </span>
                                </td>
                                <td class="px-4 py-3 text-end">
                                    <button type="button" class="btn btn-sm btn-outline-primary rounded-pill px-3 me-1"
                                            onclick="openEditProductModal(this)"
                                            th:data-id="${p.id}" th:data-cat="${p.unitCategory ?: ''}" th:data-name="${p.name ?: ''}" th:data-price="${p.price ?: 0}" th:data-stock="${p.stock ?: 0}">
                                        Edit
                                    </button>
                                    <form th:action="@{/products/delete/{id}(id=${p.id})}" method="POST" style="display:inline;">
                                        <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3"
                                                onclick="return confirm('Delete this product?')">Delete</button>
                                    </form>
                                </td>
                            </tr>
                            <tr id="noProductsRow" style="display:none;">
                                <td colspan="7" class="text-center py-4 text-muted small">No products match your filters.</td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(products)}">
                                <td colspan="7" class="text-center py-5 text-muted">
                                    <p class="mb-1">No products yet.</p>
                                    <small>Click "Add Product" to get started!</small>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add Product Modal -->
<div class="modal fade" id="addProductModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg rounded-4">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold">Add New Product</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form th:action="@{/products/add}" method="POST" onsubmit="return validateProductForm(this)">
          <div class="modal-body pt-3">
              <div class="mb-3">
                  <label class="form-label text-muted small fw-semibold">Unit Category <span class="text-danger">*</span></label>
                  <select name="unitCategory" class="form-select rounded-3" required>
                      <option value="">-- Select Unit --</option>
                      <option value="kg">Kilogram (kg)</option>
                      <option value="gram">Gram (gram)</option>
                      <option value="liters">Liters (liters)</option>
                      <option value="milli liters">Milli Liters (ml)</option>
                  </select>
              </div>
              <div class="mb-3">
                  <label class="form-label text-muted small fw-semibold">Product Name <span class="text-danger">*</span></label>
                  <input type="text" name="name" class="form-control rounded-3" placeholder="e.g. Wireless Mouse" required>
              </div>
              <div class="row g-3">
                  <div class="col-6">
                      <label class="form-label text-muted small fw-semibold">Price (₹) <span class="text-danger">*</span></label>
                      <input type="number" name="price" class="form-control rounded-3" placeholder="0.00" step="0.01" min="0" required>
                  </div>
                  <div class="col-6">
                      <label class="form-label text-muted small fw-semibold">Initial Stock <span class="text-danger">*</span></label>
                      <input type="number" name="stock" class="form-control rounded-3" placeholder="0" min="0" required>
                  </div>
              </div>
          </div>
          <div class="modal-footer border-0 pt-0">
            <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary rounded-pill px-4">Save Product</button>
          </div>
      </form>
    </div>
  </div>
</div>

<!-- Edit Product Modal -->
<div class="modal fade" id="editProductModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg rounded-4">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold">Edit Product</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="editProductForm" method="POST" onsubmit="return validateProductForm(this)">
          <div class="modal-body pt-3">
              <div class="mb-3">
                  <label class="form-label text-muted small fw-semibold">Unit Category <span class="text-danger">*</span></label>
                  <select id="editProdCat" name="unitCategory" class="form-select rounded-3" required>
                      <option value="">-- Select Unit --</option>
                      <option value="kg">Kilogram (kg)</option>
                      <option value="gram">Gram (gram)</option>
                      <option value="liters">Liters (liters)</option>
                      <option value="milli liters">Milli Liters (ml)</option>
                  </select>
              </div>
              <div class="mb-3">
                  <label class="form-label text-muted small fw-semibold">Product Name <span class="text-danger">*</span></label>
                  <input type="text" id="editProdName" name="name" class="form-control rounded-3" required>
              </div>
              <div class="row g-3">
                  <div class="col-6">
                      <label class="form-label text-muted small fw-semibold">Price (₹) <span class="text-danger">*</span></label>
                      <input type="number" id="editProdPrice" name="price" class="form-control rounded-3" step="0.01" min="0" required>
                  </div>
                  <div class="col-6">
                      <label class="form-label text-muted small fw-semibold">Stock <span class="text-danger">*</span></label>
                      <input type="number" id="editProdStock" name="stock" class="form-control rounded-3" min="0" required>
                  </div>
              </div>
          </div>
          <div class="modal-footer border-0 pt-0">
            <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary rounded-pill px-4">Update Product</button>
          </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
var contextPath = /*[[@{/}]]*/ '/';

function openEditProductModal(btn) {
    var id = btn.getAttribute('data-id');
    document.getElementById('editProdCat').value = btn.getAttribute('data-cat') || '';
    document.getElementById('editProdName').value = btn.getAttribute('data-name');
    document.getElementById('editProdPrice').value = btn.getAttribute('data-price');
    document.getElementById('editProdStock').value = btn.getAttribute('data-stock');
    document.getElementById('editProductForm').action = contextPath + 'products/edit/' + id;
    new bootstrap.Modal(document.getElementById('editProductModal')).show();
}

function validateProductForm(form) {
    // The required and min HTML5 attributes on the inputs will handle basic validation natively.
    return true;
}

function filterProductsTable() {
    var query = document.getElementById('productSearch').value.toLowerCase().trim();
    var catFilter = document.getElementById('filterCategory').value;
    var statusFilter = document.getElementById('filterStatus').value;
    
    var rows = document.querySelectorAll('.product-row');
    var visibleCount = 0;
    
    rows.forEach(function(row) {
        var name = row.querySelector('.product-name').textContent.toLowerCase();
        var category = row.getAttribute('data-category');
        var status = row.getAttribute('data-status');
        
        var matchName = !query || name.includes(query);
        var matchCat = !catFilter || category === catFilter;
        var matchStatus = !statusFilter || status === statusFilter;
        
        if (matchName && matchCat && matchStatus) {
            row.style.display = '';
            visibleCount++;
        } else {
            row.style.display = 'none';
        }
    });
    
    var noResults = document.getElementById('noProductsRow');
    if (noResults) {
        noResults.style.display = visibleCount === 0 && rows.length > 0 ? '' : 'none';
    }
}
</script>
<script th:replace="layout :: darkModeScript"></script>
</body>
</html>
