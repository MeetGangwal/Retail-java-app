<!DOCTYPE html>
<html>
<head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="p-4">
    <div class="container w-50 shadow p-4">
        <h3>Checkout</h3>
        <hr>
        <div class="mb-3">
            <label>Customer Name</label>
            <input type="text" class="form-control" placeholder="Enter Name">
        </div>
        <div class="mb-3">
            <label>Payment Method</label>
            <select class="form-control" id="payMethod" onchange="toggleUPI()">
                <option value="cash">Cash</option>
                <option value="online">Online (UPI)</option>
            </select>
        </div>
        <div class="mb-3 d-none" id="upiDiv">
            <label>Enter UPI ID</label>
            <input type="text" class="form-control" id="upiId" placeholder="example@okhdfcbank">
        </div>
        <button class="btn btn-success w-100" onclick="processPayment()">Complete Order</button>
    </div>

    <script>
        function toggleUPI() {
            let method = document.getElementById("payMethod").value;
            document.getElementById("upiDiv").classList.toggle("d-none", method !== "online");
        }
        function processPayment() {
            let method = document.getElementById("payMethod").value;
            if (method === "online" && !document.getElementById("upiId").value) {
                alert("Please enter a valid UPI ID.");
                return;
            }
            alert("Payment Successful! Order Confirmed.");
            window.location.href = "/RetailPulse/dashboard";
        }
    </script>
</body>
</html>
