<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">RetailPulse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<div th:fragment="sidebar(activePage)">
    <nav id="sidebar">
        <div class="sidebar-header">OVERVIEW</div>
        <ul class="components">
            <li th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
                <a th:href="@{/dashboard}">Dashboard</a>
            </li>
            <li th:classappend="${activePage == 'products'} ? 'active' : ''">
                <a th:href="@{/products}">Products</a>
            </li>
            <li th:classappend="${activePage == 'customers'} ? 'active' : ''">
                <a th:href="@{/customers}">Customers</a>
            </li>
            <li th:classappend="${activePage == 'billing'} ? 'active' : ''">
                <a th:href="@{/billing}">Billing</a>
            </li>
            <li th:classappend="${activePage == 'reports'} ? 'active' : ''">
                <a th:href="@{/reports}">Reports</a>
            </li>
        </ul>
    </nav>
</div>

<div th:fragment="navbar">
    <div class="top-navbar">
        <h5>Retail Management System</h5>
        <div class="d-flex align-items-center">
            <!-- Dark Mode Toggle -->
            <div class="dark-toggle">
                <label for="darkSwitch">🌙</label>
                <label class="switch">
                    <input type="checkbox" id="darkSwitch" onchange="toggleDarkMode()">
                    <span class="slider"></span>
                </label>
            </div>
            <span class="welcome-text">Welcome, <strong th:text="${user.fullName}">User</strong></span>
            <a th:href="@{/logout}" class="btn-logout">Logout</a>
        </div>
    </div>
</div>

<!-- Dark Mode Script Fragment -->
<script th:fragment="darkModeScript">
function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
    localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
}
(function() {
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
        var sw = document.getElementById('darkSwitch');
        if (sw) sw.checked = true;
    }
})();
</script>

</body>
</html>
