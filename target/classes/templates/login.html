<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RetailPulse</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-login">

<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="glass-card" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold mb-1">Welcome Back</h3>
            <p class="text-muted small mb-0">Login to Retail Management System</p>
        </div>
        
        <div th:if="${successMsg}" class="alert alert-success py-2 small mb-3" th:text="${successMsg}"></div>
        <div th:if="${errorMsg}" class="alert alert-danger py-2 small mb-3" th:text="${errorMsg}"></div>
        
        <form th:action="@{/login}" method="POST">
            <div class="mb-3">
                <label class="form-label text-muted small mb-1">Email Address</label>
                <input type="email" name="email" class="form-control border-0" style="background:#f5f5f5;" placeholder="meet@spit.ac.in" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted small mb-1">Password</label>
                <input type="password" name="password" class="form-control border-1" style="background:#f5f5f5;" placeholder="••••••" required>
            </div>
            <button type="submit" class="btn w-100 text-white fw-bold mb-3" style="background: #f7999e;">Login</button>
            <div class="text-center small">
                <span class="text-muted">New user?</span> 
                <a th:href="@{/register}" style="text-decoration: none; color: #f7999e; font-weight:600;">Create an account</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
